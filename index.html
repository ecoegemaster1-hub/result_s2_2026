<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>منصة الاطلاع على النقاط</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --primary: #166534;
  --primary-light: #16a34a;
  --primary-dark: #14532d;
  --primary-soft: #dcfce7;
  --primary-extra-soft: #f0fdf4;
  --white: #FFFFFF;
  --text: #0f172a;
  --muted: #64748b;
  --border: #bbf7d0;
  --danger: #dc2626;
  --danger-bg: #fee2e2;
  --warning: #d97706;
  --warning-bg: #fef3c7;
}

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, var(--primary-dark), var(--primary), var(--primary-light));
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}

.box {
  background: rgba(255, 255, 255, 0.98);
  padding: 40px 35px;
  width: 100%;
  max-width: 420px;
  border-radius: 24px;
  text-align: center;
  box-shadow: 0 20px 60px rgba(20, 83, 45, 0.35);
}

h2 {
  color: var(--primary-dark);
  margin-bottom: 15px;
  font-size: 28px;
}

h3 {
  color: var(--primary);
  margin-bottom: 25px;
}

input {
  width: 100%;
  padding: 14px 16px;
  margin: 12px 0;
  border-radius: 12px;
  border: 2px solid #d1fae5;
  font-size: 15px;
  background: var(--primary-extra-soft);
}

input:focus {
  outline: none;
  border-color: var(--primary-light);
  background: var(--white);
}

button {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, var(--primary-dark), var(--primary), var(--primary-light));
  color: var(--white);
  border: none;
  border-radius: 12px;
  cursor: pointer;
  font-size: 16px;
  font-weight: 700;
  margin-top: 10px;
}

.spinner {
  display: none;
  margin: 20px auto;
  width: 45px;
  height: 45px;
  border: 4px solid #d1fae5;
  border-top: 4px solid var(--primary);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

.error {
  color: var(--danger);
  margin-top: 15px;
  padding: 12px;
  background: var(--danger-bg);
  border-radius: 12px;
  font-size: 14px;
  font-weight: 600;
}

.hidden {
  display: none;
}

.link-box {
  margin-top: 20px;
  padding: 20px;
  background: linear-gradient(135deg, var(--primary-dark), var(--primary), var(--primary-light));
  border-radius: 16px;
  color: var(--white);
}

.score-box {
  display: inline-block;
  background: #FFD700;
  color: #14532d;
  padding: 5px 16px;
  border-radius: 10px;
  margin: 8px 6px;
  font-size: 23px;
  font-weight: 800;
  min-width: 55px;
  text-align: center;
}

.practice-box {
  display: inline-block;
  background: #FFFFFF;
  color: #14532d;
  padding: 5px 16px;
  border-radius: 10px;
  margin: 8px 6px;
  font-size: 23px;
  font-weight: 800;
  min-width: 55px;
  text-align: center;
}

.result-text {
  font-size: 18px;
  font-weight: 700;
  line-height: 1.8;
}

.download-link {
  display: inline-block;
  background: #FFD700;
  color: #14532d;
  padding: 10px 18px;
  border-radius: 10px;
  text-decoration: none;
  font-weight: 800;
  font-size: 15px;
  margin-top: 12px;
}

.appeal-link {
  margin-top: 20px;
  padding-top: 15px;
  border-top: 1px solid #d1fae5;
}

.appeal-link a {
  text-decoration: none;
}

.hint {
  font-size: 12px;
  color: var(--muted);
  margin-top: 15px;
}

.hint strong {
  color: var(--primary);
}
</style>
</head>

<body>

<div class="box">
  <h2>الاطلاع على نقطة امتحان</h2>
  <h3>تطبيقات التعلم العميق</h3>

  <input id="username" placeholder="👤 اللقب بالحروف اللاتينية (MAJ)" autocomplete="off">
  <input id="password" type="password" placeholder="ادخل الكود الذي تحصلت عليه يوم الامتحان" autocomplete="off">
  <input id="newPassword" type="password" placeholder="كلمة المرور الجديدة" style="display:none;" autocomplete="off">

  <button id="btn" onclick="login()">دخول</button>

  <div id="spinner" class="spinner"></div>
  <div id="errorMsg" class="error hidden"></div>
  <div id="linkBox" class="hidden"></div>

  <div class="appeal-link">
    <a href="https://docs.google.com/forms/d/e/1FAIpQLSc_-9aHUGfDbZkasJcY9M9i-SLL1L9DoZOYqehQp6gfz0fGAA/viewform?usp=sharing&ouid=114845991663438096251">
      <button type="button">تقديم طعن بخصوص خطأ في التصحيح</button>
    </a>

    <div class="hint">
      تم تصميم المنصة من قبل <strong>د. زيات عادل</strong>
    </div>
  </div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwSwOoFytgbVtLD3B3fsL7fgAypzjq9fODoFs2DjM_0d11y06s2i_L52BMwp-vQNj0n4Q/exec";

async function login() {
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value;
  const newPassword = document.getElementById("newPassword").value.trim();

  const btn = document.getElementById("btn");
  const spinner = document.getElementById("spinner");
  const errorMsg = document.getElementById("errorMsg");
  const linkBox = document.getElementById("linkBox");

  errorMsg.classList.add("hidden");
  linkBox.classList.add("hidden");
  linkBox.innerHTML = "";
  errorMsg.innerHTML = "";

  if (!username || !password) {
    errorMsg.innerHTML = "يرجى إدخال اسم المستخدم وكلمة المرور";
    errorMsg.classList.remove("hidden");
    return;
  }

  btn.style.display = "none";
  spinner.style.display = "block";

  let url = `${SCRIPT_URL}?username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`;

  if (newPassword) {
    url += `&newPassword=${encodeURIComponent(newPassword)}`;
  }

  try {
    const response = await fetch(url);
    const data = await response.json();

    if (data.firstLogin) {
      errorMsg.innerHTML = "هذا أول دخول لك، يرجى إدخال كلمة مرور جديدة";
      errorMsg.classList.remove("hidden");

      document.getElementById("newPassword").style.display = "block";
      btn.innerText = "تغيير كلمة المرور";

      btn.style.display = "block";
      spinner.style.display = "none";
      return;
    }

    if (data.success) {
      if (newPassword) {
        document.getElementById("password").value = newPassword;
        document.getElementById("newPassword").style.display = "none";
        btn.innerText = "دخول";
      }

      linkBox.innerHTML = `
        <div class="link-box">
          <strong style="font-size:20px; display:block; margin-bottom:12px;">
            عزيزي الطالب
          </strong>

          <div class="result-text">
            نقطة الامتحان الخاصة بك هي:
            <span class="score-box">
              ${data.score ?? "غير متوفرة"}
            </span>

            <br>

            نقطة التطبيق الخاصة بك هي:
            <span class="practice-box">
              ${data.practiceScore ?? "غير متوفرة"}
            </span>
          </div>

          <div style="font-size:14px; margin-top:16px; line-height:1.8;">
            يمكن الاطلاع على التفاصيل والحل النموذجي من خلال الرابط التالي:
          </div>

          ${
            data.link
              ? `<a href="${data.link}" target="_blank" rel="noopener noreferrer" class="download-link">
                  تحميل تفاصيل النتيجة
                </a>`
              : `<div style="background:#FFFFFF; color:#b91c1c; padding:10px 14px; border-radius:10px; font-weight:700; margin-top:12px;">
                  رابط التفاصيل غير متوفر حاليًا
                </div>`
          }
        </div>
      `;

      linkBox.classList.remove("hidden");

      btn.style.display = "block";
      spinner.style.display = "none";
      return;
    }

    errorMsg.innerHTML = data.message || "بيانات خاطئة، حاول مرة أخرى";
    errorMsg.classList.remove("hidden");

  } catch(err) {
    errorMsg.innerHTML = "خطأ في الاتصال بالخادم";
    errorMsg.classList.remove("hidden");
  }

  btn.style.display = "block";
  spinner.style.display = "none";
}
</script>

</body>
</html>
